<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meet in the Middle</title>
  <meta name="description" content="Find the perfect meeting spot between multiple locations — fair travel times for everyone." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar">
      <header id="sidebar-header">
        <div id="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="8" cy="20" r="5" fill="#58a6ff" opacity="0.9"/>
            <circle cx="20" cy="20" r="5" fill="#f78166" opacity="0.9"/>
            <circle cx="14" cy="9" r="5" fill="#56d364" opacity="0.9"/>
            <circle cx="14" cy="16" r="3" fill="white" opacity="0.95"/>
          </svg>
        </div>
        <div>
          <h1>Meet in the Middle</h1>
          <p id="tagline">Find the fairest meeting spot for everyone</p>
        </div>
      </header>

      <!-- People inputs -->
      <section id="people-section">
        <div class="section-label">
          <span>Locations</span>
          <button id="add-person-btn" title="Add another person">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Add person
          </button>
        </div>
        <div id="people-list">
          <!-- person cards inserted by JS -->
        </div>
      </section>

      <!-- Find button -->
      <button id="find-btn">
        <span id="find-btn-text">Find Meeting Spots</span>
        <span id="find-btn-spinner" hidden>
          <svg class="spin" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
            <path d="M8 2a6 6 0 0 1 6 6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </span>
      </button>

      <!-- Progress steps -->
      <div id="progress-bar" hidden>
        <div class="progress-step" id="step-geocode">
          <div class="step-dot"></div>
          <span>Geocoding addresses</span>
        </div>
        <div class="progress-step" id="step-places">
          <div class="step-dot"></div>
          <span>Finding nearby places</span>
        </div>
        <div class="progress-step" id="step-routes">
          <div class="step-dot"></div>
          <span>Calculating routes</span>
        </div>
        <div class="progress-step" id="step-score">
          <div class="step-dot"></div>
          <span>Scoring &amp; ranking</span>
        </div>
      </div>

      <!-- Error banner -->
      <div id="error-banner" hidden>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 3.5a.75.75 0 0 1 .75.75v3a.75.75 0 0 1-1.5 0v-3A.75.75 0 0 1 8 4.5zm0 7a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
        </svg>
        <span id="error-text"></span>
      </div>

      <!-- Results -->
      <section id="results-section" hidden>
        <div class="section-label">
          <span id="results-label">Top Meeting Spots</span>
        </div>
        <div id="results-list">
          <!-- suggestion cards inserted by JS -->
        </div>
        <p id="results-note">Travel times are driving estimates. Routes shown are straight lines.</p>
      </section>
    </aside>

    <!-- ── MAP ── -->
    <main id="map-container">
      <div id="map"></div>
      <div id="map-overlay-hint">Enter locations and click <strong>Find Meeting Spots</strong></div>
    </main>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
